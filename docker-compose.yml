services:
  web:
    build: .
    restart: unless-stopped
    # Ajuste de comandos y optimización de ejecución
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
    networks:
      - axioma-net
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
    # Asegura que el contenedor tenga permisos adecuados
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - axioma-net
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - axioma-net

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    # Solución profesional a los permisos sin usar root (0:0)
    # Grafana usa el UID 472 por defecto
    user: "472" 
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - axioma-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Cambia esto por una variable de entorno segura

networks:
  axioma-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  redis_data: # Persistencia para Redis añadida
